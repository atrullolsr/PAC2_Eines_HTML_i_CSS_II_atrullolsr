<!doctype html>

<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" type="text/css" href="./assets/styles/main.scss" />
    <!-- do not remove this line! -->
    <title>Aura Negra | Jornades d'Artesania i Foc</title>
  </head>
  <body class="page-home">
    <include src="./views/header.html"></include>

    <main class="l-poster-wrapper">
      <section class="c-poster">

        <header class="c-poster__header">
          <div class="c-poster__title">
            <span class="c-poster__text--huge">Aura</span>Negra
          </div>
          <p class="c-poster__subtitle">L'ART DEL FANG I EL FOC</p>
        </header>

        <div class="c-poster__image-box">
          <div id="carouselAuraNegra" data-bs-interval="6000" class="carousel slide carousel-fade" data-bs-ride="carousel">

            <div class="carousel-indicators">
              <button type="button" data-bs-target="#carouselAuraNegra" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
              <button type="button" data-bs-target="#carouselAuraNegra" data-bs-slide-to="1" aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#carouselAuraNegra" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>

            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="assets/images/pottery-hands.jpg" class="d-block w-100 c-poster__img" alt="Artesa treballant el fang">
                <div class="carousel-caption d-none d-md-block text-end">
                  <p class="small opacity-75">Foto: Monika Bienert - monika_g</p>
                </div>
              </div>
              <div class="carousel-item">
                <img src="assets/images/brick-oven-fire.jpg" class="d-block w-100 c-poster__img" alt="Horno de ladrillos con fuego">
                <div class="carousel-caption d-none d-md-block text-end">
                  <p class="small opacity-75">Foto: Jay Gajjar - jaygajjar</p>
                </div>
              </div>
              <div class="carousel-item">
                <img src="assets/images/taller-sambola.jpg" class="d-block w-100 c-poster__img" alt="Taller Sambolla">
                <div class="carousel-caption d-none d-md-block text-end">
                  <p class="small opacity-75">Foto: José Miguel Barrantes Martín</p>
                </div>
              </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselAuraNegra" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselAuraNegra" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Següent</span>
            </button>
          </div>
        </div>

        <div class="c-poster__info">
          <p class="c-poster__date">06 — 07 JUNY</p>
          <p class="c-poster__location">VERDÚ, L'URGELL</p>
        </div>

        <div class="c-poster__actions">
          <a href="article.html" class="btn btn-primary">Article</a>
          <a href="extra.html" class="btn btn-primary">Agenda</a>
        </div>




      </section>
    </main>

    <include src="./views/footer.html"></include>
    <script type="module" src="./assets/scripts/main.js"></script>
    <!-- do not remove this line! -->
  </body>
</html>
